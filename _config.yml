title: 专 利 一 麻 袋
description: 搜罗设计相关的最新专利

url: "https://hi-o-id.github.io"
baseurl: "/p"
lang: "zh-CN"
timezone: "Asia/Shanghai"

google_analytics: "G-9QBC2W58K4"

# 静态资源缓存版本号（可选）。留空可关闭 ?v= 参数。
asset_version: "20260314-10"

# 构建设置
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives  # 归档插件

# 归档插件配置
jekyll-archives:
  enabled: 
    - year
    - month
    - categories  # ✅ 启用 Category 归档
  layout: archive
  permalinks:
    year: '/archive/:year/'
    month: '/archive/:year/:month/'
    category: '/category/:name/'  # ✅ Category 归档 URL

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: []

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

minima:
  date_format: "%Y-%m-%d"

weekly_posts_limit: 20

author:
  name: ""
